name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Swift tests
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Build release app
        run: Scripts/package-app.sh
